name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Nakama TypeScript server module ─────────────────────────
  server:
    name: Server — type-check · test · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nakama-modules

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: nakama-modules/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:ci

      - name: Build (tsc → build/index.js)
        run: npm run build

  # ─── Next.js frontend ─────────────────────────────────────────
  frontend:
    name: Frontend — type-check · lint · test · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:ci

      - name: Build
        # NEXT_PUBLIC_* vars are baked into the bundle at build time.
        # Provide defaults here so the build succeeds in CI without real secrets.
        run: npm run build
        env:
          NEXT_PUBLIC_NAKAMA_HOST: localhost
          NEXT_PUBLIC_NAKAMA_PORT: "7350"
          NEXT_PUBLIC_NAKAMA_USE_SSL: "false"
          NEXT_PUBLIC_NAKAMA_KEY: defaultkey
