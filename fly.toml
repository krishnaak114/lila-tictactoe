app = "lila-nakama"
primary_region = "lhr"

[build]
  image = "registry.heroiclabs.com/heroiclabs/nakama:3.22.0"

[mounts]
  source = "nakama_data"
  destination = "/nakama/data"

[[services]]
  internal_port = 7350
  protocol = "tcp"

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"

[env]
  # Override this with your CockroachDB Serverless URL for production.
  # For local testing use docker-compose.yml instead.
  NAKAMA_DATABASE_ADDRESS = "root@localhost:26257"
  NAKAMA_RUNTIME_JS_ENTRYPOINT_FILEPATH = "/nakama/data/modules/index.js"
  NAKAMA_LOGGER_LEVEL = "INFO"
  NAKAMA_SESSION_TOKEN_EXPIRY_SEC = "7200"
