app = "lila-nakama"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[[services]]
  internal_port = 7350
  protocol = "tcp"

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
